name: Deploy to FTP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate FTP secrets
        shell: powershell
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:FTP_SERVER)) { Write-Error "Missing secret FTP_SERVER"; exit 1 }
          if ([string]::IsNullOrWhiteSpace($env:FTP_USERNAME)) { Write-Error "Missing secret FTP_USERNAME"; exit 1 }
          if ([string]::IsNullOrWhiteSpace($env:FTP_PASSWORD)) { Write-Error "Missing secret FTP_PASSWORD"; exit 1 }
          Write-Host "Secrets check passed."

      - name: Check DNS and port 21
        shell: powershell
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          try {
            $null = [System.Net.Dns]::GetHostAddresses($env:FTP_SERVER)
          } catch {
            Write-Error "Cannot resolve FTP_SERVER: $env:FTP_SERVER"
            exit 1
          }

          $client = New-Object System.Net.Sockets.TcpClient
          $connectTask = $client.ConnectAsync($env:FTP_SERVER, 21)
          if (-not $connectTask.Wait(10000)) {
            $client.Dispose()
            Write-Error "Cannot connect to $($env:FTP_SERVER):21 (network/firewall/host blocking this runner)"
            exit 1
          }
          $client.Dispose()
          Write-Host "Network check passed."

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /domains/dichvucongngheqng.com/public_html/
          dangerous-clean-slate: true
          log-level: verbose
